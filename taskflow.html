<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow - Lightweight Task Manager</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    * {
        font-family: 'Inter', sans-serif;
    }
    
    .task-enter {
        animation: slideIn 0.3s ease-out;
    }
    
    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .task-exit {
        animation: slideOut 0.2s ease-in forwards;
    }
    
    @keyframes slideOut {
        to {
            opacity: 0;
            transform: translateX(-20px);
        }
    }
    
    .checkbox-custom:checked + label .check-icon {
        opacity: 1;
        transform: scale(1);
    }
    
    .checkbox-custom:checked + label {
        background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        border-color: #6366f1;
    }
    
    .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
    }
    
    @media (prefers-color-scheme: dark) {
        .glass {
            background: rgba(17, 24, 39, 0.7);
        }
    }
</style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-purple-50 dark:from-gray-900 dark:via-gray-900 dark:to-indigo-950 min-h-screen transition-colors duration-300">
    
    <div class="container mx-auto px-4 py-8 max-w-3xl">
        <!-- Header -->
        <header class="mb-8">
            <div class="flex items-center justify-between mb-2">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path>
                        </svg>
                    </div>
                    <h1 class="text-3xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">TaskFlow</h1>
                </div>
                <button id="themeToggle" class="p-2 rounded-lg glass border border-gray-200 dark:border-gray-700 hover:scale-105 transition-transform">
                    <svg class="w-5 h-5 text-gray-700 dark:text-gray-300 sun-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                    </svg>
                    <svg class="w-5 h-5 text-gray-300 moon-icon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                    </svg>
                </button>
            </div>
            <p class="text-gray-600 dark:text-gray-400 text-sm">Lightweight task management with localStorage</p>
        </header>

        <!-- Stats Cards -->
        <div class="grid grid-cols-3 gap-3 mb-6">
            <div class="glass rounded-xl p-4 border border-gray-200 dark:border-gray-800 shadow-sm">
                <div class="text-2xl font-bold text-indigo-600 dark:text-indigo-400" id="totalCount">0</div>
                <div class="text-xs text-gray-600 dark:text-gray-400 font-medium">Total</div>
            </div>
            <div class="glass rounded-xl p-4 border border-gray-200 dark:border-gray-800 shadow-sm">
                <div class="text-2xl font-bold text-green-600 dark:text-green-400" id="completedCount">0</div>
                <div class="text-xs text-gray-600 dark:text-gray-400 font-medium">Completed</div>
            </div>
            <div class="glass rounded-xl p-4 border border-gray-200 dark:border-gray-800 shadow-sm">
                <div class="text-2xl font-bold text-amber-600 dark:text-amber-400" id="pendingCount">0</div>
                <div class="text-xs text-gray-600 dark:text-gray-400 font-medium">Pending</div>
            </div>
        </div>

        <!-- Add Task Form -->
        <div class="glass rounded-2xl p-6 mb-6 border border-gray-200 dark:border-gray-800 shadow-xl">
            <form id="taskForm" class="space-y-4">
                <div>
                    <input 
                        type="text" 
                        id="taskTitle" 
                        placeholder="Task title..." 
                        required
                        maxlength="100"
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all text-sm"
                    >
                </div>
                <div class="flex gap-3">
                    <textarea 
                        id="taskDescription" 
                        placeholder="Description (optional)" 
                        rows="2"
                        maxlength="500"
                        class="flex-1 px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all text-sm resize-none"
                    ></textarea>
                    <button 
                        type="submit" 
                        class="px-6 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-semibold rounded-xl shadow-lg hover:shadow-xl transition-all hover:scale-105 active:scale-95 flex items-center gap-2"
                    >
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                        </svg>
                        <span class="hidden sm:inline">Add</span>
                    </button>
                </div>
                <div class="flex gap-2 flex-wrap">
                    <select id="taskPriority" class="px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 text-xs font-medium outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="low">Low Priority</option>
                        <option value="medium" selected>Medium Priority</option>
                        <option value="high">High Priority</option>
                    </select>
                    <input 
                        type="date" 
                        id="taskDueDate" 
                        class="px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 text-xs font-medium outline-none focus:ring-2 focus:ring-indigo-500"
                    >
                </div>
            </form>
        </div>

        <!-- Filters -->
        <div class="flex gap-2 mb-6 overflow-x-auto pb-2">
            <button data-filter="all" class="filter-btn px-4 py-2 rounded-lg bg-indigo-600 text-white text-sm font-semibold shadow-md transition-all whitespace-nowrap">All Tasks</button>
            <button data-filter="active" class="filter-btn px-4 py-2 rounded-lg glass border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 text-sm font-semibold transition-all whitespace-nowrap hover:bg-gray-100 dark:hover:bg-gray-800">Active</button>
            <button data-filter="completed" class="filter-btn px-4 py-2 rounded-lg glass border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 text-sm font-semibold transition-all whitespace-nowrap hover:bg-gray-100 dark:hover:bg-gray-800">Completed</button>
        </div>

        <!-- Task List -->
        <div id="taskList" class="space-y-3"></div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-16 hidden">
            <div class="w-20 h-20 mx-auto mb-4 bg-gradient-to-br from-indigo-100 to-purple-100 dark:from-indigo-900/30 dark:to-purple-900/30 rounded-2xl flex items-center justify-center">
                <svg class="w-10 h-10 text-indigo-600 dark:text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                </svg>
            </div>
            <h3 class="text-lg font-semibold text-gray-900 dark:text-gray-100 mb-2">No tasks yet</h3>
            <p class="text-gray-600 dark:text-gray-400 text-sm">Create your first task to get started</p>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
        <div class="glass rounded-2xl p-6 max-w-lg w-full border border-gray-200 dark:border-gray-800 shadow-2xl">
            <h2 class="text-xl font-bold text-gray-900 dark:text-gray-100 mb-4">Edit Task</h2>
            <form id="editForm" class="space-y-4">
                <input type="hidden" id="editId">
                <input 
                    type="text" 
                    id="editTitle" 
                    required
                    maxlength="100"
                    class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-indigo-500 outline-none text-sm"
                >
                <textarea 
                    id="editDescription" 
                    rows="3"
                    maxlength="500"
                    class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-indigo-500 outline-none text-sm resize-none"
                ></textarea>
                <div class="flex gap-2">
                    <select id="editPriority" class="flex-1 px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="low">Low Priority</option>
                        <option value="medium">Medium Priority</option>
                        <option value="high">High Priority</option>
                    </select>
                    <input 
                        type="date" 
                        id="editDueDate" 
                        class="flex-1 px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 text-sm outline-none focus:ring-2 focus:ring-indigo-500"
                    >
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="button" id="cancelEdit" class="flex-1 px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-700 text-gray-700 dark:text-gray-300 font-semibold hover:bg-gray-100 dark:hover:bg-gray-800 transition-all">Cancel</button>
                    <button type="submit" class="flex-1 px-4 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold rounded-xl shadow-lg hover:shadow-xl transition-all">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
        <div class="glass rounded-2xl p-6 max-w-md w-full border border-gray-200 dark:border-gray-800 shadow-2xl">
            <div class="w-12 h-12 bg-red-100 dark:bg-red-900/30 rounded-xl flex items-center justify-center mb-4">
                <svg class="w-6 h-6 text-red-600 dark:text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
            </div>
            <h2 class="text-xl font-bold text-gray-900 dark:text-gray-100 mb-2">Delete Task</h2>
            <p class="text-gray-600 dark:text-gray-400 text-sm mb-6">Are you sure you want to delete this task? This action cannot be undone.</p>
            <div class="flex gap-3">
                <button id="cancelDelete" class="flex-1 px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-700 text-gray-700 dark:text-gray-300 font-semibold hover:bg-gray-100 dark:hover:bg-gray-800 transition-all">Cancel</button>
                <button id="confirmDelete" class="flex-1 px-4 py-3 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-xl shadow-lg transition-all">Delete</button>
            </div>
        </div>
    </div>

    <script>
        // State Management
        let tasks = [];
        let currentFilter = 'all';
        let deleteTaskId = null;

        // DOM Elements
        const taskForm = document.getElementById('taskForm');
        const taskList = document.getElementById('taskList');
        const emptyState = document.getElementById('emptyState');
        const editModal = document.getElementById('editModal');
        const deleteModal = document.getElementById('deleteModal');
        const editForm = document.getElementById('editForm');
        const themeToggle = document.getElementById('themeToggle');

        // Initialize
        function init() {
            loadTasks();
            loadTheme();
            renderTasks();
            updateStats();
            attachEventListeners();
        }

        // LocalStorage Operations
        function loadTasks() {
            const stored = localStorage.getItem('taskflow_tasks');
            tasks = stored ? JSON.parse(stored) : [];
        }

        function saveTasks() {
            localStorage.setItem('taskflow_tasks', JSON.stringify(tasks));
        }

        function loadTheme() {
            const theme = localStorage.getItem('taskflow_theme') || 'light';
            document.documentElement.classList.toggle('dark', theme === 'dark');
            updateThemeIcon(theme);
        }

        function updateThemeIcon(theme) {
            document.querySelector('.sun-icon').classList.toggle('hidden', theme === 'dark');
            document.querySelector('.moon-icon').classList.toggle('hidden', theme !== 'dark');
        }

        // CRUD Operations
        function createTask(taskData) {
            const task = {
                id: Date.now().toString(),
                title: taskData.title.trim(),
                description: taskData.description.trim(),
                priority: taskData.priority,
                dueDate: taskData.dueDate,
                completed: false,
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            tasks.unshift(task);
            saveTasks();
            renderTasks();
            updateStats();
        }

        function updateTask(id, updates) {
            const index = tasks.findIndex(t => t.id === id);
            if (index !== -1) {
                tasks[index] = { ...tasks[index], ...updates, updatedAt: new Date().toISOString() };
                saveTasks();
                renderTasks();
                updateStats();
            }
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            renderTasks();
            updateStats();
        }

        function toggleComplete(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                updateTask(id, { completed: !task.completed });
            }
        }

        // Rendering
        function renderTasks() {
            const filtered = tasks.filter(task => {
                if (currentFilter === 'active') return !task.completed;
                if (currentFilter === 'completed') return task.completed;
                return true;
            });

            if (filtered.length === 0) {
                taskList.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            taskList.innerHTML = filtered.map(task => createTaskHTML(task)).join('');
        }

        function createTaskHTML(task) {
            const priorityColors = {
                low: 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400',
                medium: 'bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400',
                high: 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400'
            };

            const dueDate = task.dueDate ? new Date(task.dueDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '';
            const isOverdue = task.dueDate && new Date(task.dueDate) < new Date() && !task.completed;

            return `
                <div class="task-enter glass rounded-xl p-5 border border-gray-200 dark:border-gray-800 shadow-sm hover:shadow-md transition-all ${task.completed ? 'opacity-60' : ''}" data-id="${task.id}">
                    <div class="flex items-start gap-4">
                        <div class="relative mt-1">
                            <input 
                                type="checkbox" 
                                id="task-${task.id}" 
                                ${task.completed ? 'checked' : ''} 
                                class="checkbox-custom sr-only"
                                onchange="toggleComplete('${task.id}')"
                            >
                            <label for="task-${task.id}" class="w-5 h-5 border-2 border-gray-300 dark:border-gray-600 rounded-md flex items-center justify-center cursor-pointer transition-all hover:border-indigo-500">
                                <svg class="check-icon w-3 h-3 text-white opacity-0 transition-all scale-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                                </svg>
                            </label>
                        </div>
                        <div class="flex-1 min-w-0">
                            <h3 class="font-semibold text-gray-900 dark:text-gray-100 mb-1 ${task.completed ? 'line-through' : ''}">${escapeHTML(task.title)}</h3>
                            ${task.description ? `<p class="text-sm text-gray-600 dark:text-gray-400 mb-2">${escapeHTML(task.description)}</p>` : ''}
                            <div class="flex items-center gap-2 flex-wrap">
                                <span class="px-2 py-1 rounded-md text-xs font-medium ${priorityColors[task.priority]}">${task.priority}</span>
                                ${dueDate ? `<span class="text-xs text-gray-500 dark:text-gray-400 flex items-center gap-1 ${isOverdue ? 'text-red-600 dark:text-red-400 font-semibold' : ''}">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                                    </svg>
                                    ${dueDate} ${isOverdue ? '(Overdue)' : ''}
                                </span>` : ''}
                            </div>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="openEditModal('${task.id}')" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-600 dark:text-gray-400 transition-all">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                                </svg>
                            </button>
                            <button onclick="openDeleteModal('${task.id}')" class="p-2 rounded-lg hover:bg-red-100 dark:hover:bg-red-900/30 text-red-600 dark:text-red-400 transition-all">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const pending = total - completed;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('pendingCount').textContent = pending;
        }

        // Helper Functions
        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Modal Functions
        function openEditModal(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;
            
            document.getElementById('editId').value = task.id;
            document.getElementById('editTitle').value = task.title;
            document.getElementById('editDescription').value = task.description;
            document.getElementById('editPriority').value = task.priority;
            document.getElementById('editDueDate').value = task.dueDate || '';
            
            editModal.classList.remove('hidden');
            editModal.classList.add('flex');
        }

        function closeEditModal() {
            editModal.classList.add('hidden');
            editModal.classList.remove('flex');
            editForm.reset();
        }

        function openDeleteModal(id) {
            deleteTaskId = id;
            deleteModal.classList.remove('hidden');
            deleteModal.classList.add('flex');
        }

        function closeDeleteModal() {
            deleteTaskId = null;
            deleteModal.classList.add('hidden');
            deleteModal.classList.remove('flex');
        }

        // Event Listeners
        function attachEventListeners() {
            // Add Task
            taskForm.addEventListener('submit', (e) => {
                e.preventDefault();
                createTask({
                    title: document.getElementById('taskTitle').value,
                    description: document.getElementById('taskDescription').value,
                    priority: document.getElementById('taskPriority').value,
                    dueDate: document.getElementById('taskDueDate').value
                });
                taskForm.reset();
                document.getElementById('taskPriority').value = 'medium';
            });

            // Edit Task
            editForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const id = document.getElementById('editId').value;
                updateTask(id, {
                    title: document.getElementById('editTitle').value,
                    description: document.getElementById('editDescription').value,
                    priority: document.getElementById('editPriority').value,
                    dueDate: document.getElementById('editDueDate').value
                });
                closeEditModal();
            });

            // Delete Task
            document.getElementById('confirmDelete').addEventListener('click', () => {
                if (deleteTaskId) {
                    const taskEl = document.querySelector(`[data-id="${deleteTaskId}"]`);
                    if (taskEl) {
                        taskEl.classList.add('task-exit');
                        setTimeout(() => {
                            deleteTask(deleteTaskId);
                            closeDeleteModal();
                        }, 200);
                    }
                }
            });

            // Modal Close Buttons
            document.getElementById('cancelEdit').addEventListener('click', closeEditModal);
            document.getElementById('cancelDelete').addEventListener('click', closeDeleteModal);
            
            // Close modals on backdrop click
            editModal.addEventListener('click', (e) => {
                if (e.target === editModal) closeEditModal();
            });
            deleteModal.addEventListener('click', (e) => {
                if (e.target === deleteModal) closeDeleteModal();
            });

            // Filters
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentFilter = btn.dataset.filter;
                    document.querySelectorAll('.filter-btn').forEach(b => {
                        b.classList.remove('bg-indigo-600', 'text-white');
                        b.classList.add('glass', 'text-gray-700', 'dark:text-gray-300');
                    });
                    btn.classList.add('bg-indigo-600', 'text-white');
                    btn.classList.remove('glass', 'text-gray-700', 'dark:text-gray-300');
                    renderTasks();
                });
            });

            // Theme Toggle
            themeToggle.addEventListener('click', () => {
                const isDark = document.documentElement.classList.toggle('dark');
                localStorage.setItem('taskflow_theme', isDark ? 'dark' : 'light');
                updateThemeIcon(isDark ? 'dark' : 'light');
            });
        }

        // Make functions globally available for inline handlers
        window.toggleComplete = toggleComplete;
        window.openEditModal = openEditModal;
        window.openDeleteModal = openDeleteModal;

        // Start App
        init();
    </script>
</body>
</html>
